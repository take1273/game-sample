<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ファイトアリーナ</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  html, body { width:100%; height:100%; overflow:hidden; background:#0a0d18; touch-action:none; font-family:'Segoe UI',-apple-system,sans-serif; }
  #gameContainer { position:relative; width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; touch-action:none; }

  #hud {
    position:absolute; top:0; left:0; right:0; padding:10px 14px;
    display:flex; justify-content:space-between; pointer-events:none; z-index:5;
  }
  .playerCard { display:flex; flex-direction:column; align-items:center; width:110px; }
  .playerCard.right { align-items:flex-end; }
  .pname { color:#fff; font-size:12px; font-weight:700; letter-spacing:1px; opacity:0.8; }
  .stocks { font-size:14px; letter-spacing:2px; margin:2px 0; }
  .dmg { font-size:26px; font-weight:900; text-shadow:0 0 8px currentColor; }

  #hint {
    position:absolute; bottom:14px; left:0; right:0; text-align:center;
    color:rgba(255,255,255,0.55); font-size:12px; letter-spacing:0.5px;
    pointer-events:none; z-index:5;
  }

  #overlay {
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; background:rgba(3,5,15,0.9);
    color:#fff; text-align:center; z-index:10; padding:20px;
  }
  #overlay h1 { font-size:26px; background:linear-gradient(90deg,#ff8a5c,#7fc4ff); -webkit-background-clip:text; background-clip:text; color:transparent; margin-bottom:10px; letter-spacing:2px; }
  #overlay p { font-size:13px; opacity:0.75; margin-bottom:20px; line-height:1.7; max-width:280px; }
  button.startBtn {
    background:linear-gradient(135deg,#ff8a5c,#7c5cff); color:#fff; border:none;
    padding:14px 34px; font-size:16px; font-weight:700; border-radius:30px;
    box-shadow:0 0 20px rgba(255,140,90,0.4); letter-spacing:1px;
  }
  button.startBtn:active { transform:scale(0.96); }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="playerCard">
      <div class="pname" style="color:#7fc4ff">P1</div>
      <div class="stocks" id="p1stocks">●●●</div>
      <div class="dmg" id="p1dmg" style="color:#7fc4ff">0%</div>
    </div>
    <div class="playerCard right">
      <div class="pname" style="color:#ff8a5c">CPU</div>
      <div class="stocks" id="p2stocks">●●●</div>
      <div class="dmg" id="p2dmg" style="color:#ff8a5c">0%</div>
    </div>
  </div>

  <div id="hint">キャラをドラッグで移動・上へドラッグでジャンプ ／ 上半身タップ=パンチ・下半身タップ=下段キック</div>

  <div id="overlay">
    <h1>FIGHT ARENA</h1>
    <p>P1(青)本体をドラッグしてその方向に移動。<br>上方向にドラッグするとジャンプ(2段可)。<br>キャラの上半身を軽くタップ=パンチ、下半身を軽くタップ=下段キック。<br>下段キックは相手が地上にいる時だけ当たる代わりに、大きく吹っ飛ばさず横に払う。<br>お互いの体はすり抜けられない壁。反対側に回り込むには、ジャンプで相手の頭上を飛び越えよう。<br>相手を吹っ飛ばしてKOしよう(左右の場外のみ)。<br>ストック3つを先に失った方が負け。</p>
    <button class="startBtn" id="startBtn">スタート</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');

function resize() {
  const w = Math.min(window.innerWidth, 480);
  const h = window.innerHeight;
  canvas.width = w * devicePixelRatio;
  canvas.height = h * devicePixelRatio;
  canvas.style.width = w+'px';
  canvas.style.height = h+'px';
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  W = w; H = h;
  setupStage();
}
let W,H, platforms=[], ground;
resize();
window.addEventListener('resize', resize);

function setupStage() {
  ground = { x:0, y:H*0.78, w:W, h:H };
  platforms = [];
}

const GRAVITY = 0.55;
const FRICTION = 0.82;

function makeFighter(x, color, facing) {
  return {
    x, y: 100, vx:0, vy:0, w:32, h:176,
    color, facing,
    dmg:0, stocks:3,
    onGround:false, jumps:2,
    attackTimer:0, attackCooldown:0, attackType:'punch',
    hitstun:0,
    dead:false,
    invuln:0
  };
}

let p1, p2, particles, running, gameEnded;

function initGame() {
  p1 = makeFighter(W*0.3, '#4fc3ff', 1);
  p2 = makeFighter(W*0.7, '#ff8a5c', -1);
  particles = [];
  running = true;
  gameEnded = false;
  updateHUD();
}

function updateHUD() {
  document.getElementById('p1dmg').textContent = Math.round(p1.dmg)+'%';
  document.getElementById('p2dmg').textContent = Math.round(p2.dmg)+'%';
  document.getElementById('p1stocks').textContent = '●'.repeat(Math.max(p1.stocks,0));
  document.getElementById('p2stocks').textContent = '●'.repeat(Math.max(p2.stocks,0));
}

// ---- drag-the-character-to-move + tap-to-attack input ----
const keys = { jump:false, attack:false };
let isDraggingCharacter = false;
let dragOffsetX = 0;
let dragActive = false;
let dragStartX = 0, dragStartY = 0, dragStartTime = 0;
let dragTotalDist = 0;
let pendingDragX = null;
let queuedAttackType = 'punch';
let dragJumpTier = 0;
const TAP_DIST = 14;
const TAP_TIME = 280;
const GRAB_PAD = 26; // タップしやすいように当たり判定を少し広げる
const JUMP_DRAG_STEP = 32; // 上方向にこの距離ドラッグするごとにジャンプ1回分

function doJump(f) {
  if (!f || f.dead || f.hitstun > 0) return;
  if (f.jumps > 0) {
    f.vy = -11;
    f.jumps--;
    for (let i=0;i<6;i++) particles.push({x:f.x,y:f.y+f.h/2,vx:(Math.random()-0.5)*2,vy:Math.random()*1,life:12,color:'200,220,255'});
  }
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const t = e.touches ? (e.touches[0] || e.changedTouches[0]) : e;
  return { x: t.clientX - rect.left, y: t.clientY - rect.top };
}

function isOnCharacter(p, f) {
  return p.x > f.x - f.w/2 - GRAB_PAD && p.x < f.x + f.w/2 + GRAB_PAD &&
         p.y > f.y - f.h/2 - GRAB_PAD && p.y < f.y + f.h/2 + GRAB_PAD;
}

function decideAttackType(p, f) {
  // f.y はキャラ中心。中心より上をタップ=パンチ、下をタップ=下段キック
  return p.y < f.y ? 'punch' : 'lowkick';
}

function onDragStart(e) {
  const p = getPos(e);
  dragActive = true;
  dragStartX = p.x; dragStartY = p.y;
  dragStartTime = performance.now();
  dragTotalDist = 0;
  dragJumpTier = 0;
  if (p1 && isOnCharacter(p, p1)) {
    isDraggingCharacter = true;
    dragOffsetX = p.x - p1.x;
    pendingDragX = p1.x;
    queuedAttackType = decideAttackType(p, p1);
  } else {
    isDraggingCharacter = false;
    pendingDragX = null;
    queuedAttackType = 'punch';
  }
  e.preventDefault();
}
function onDragMove(e) {
  if (!dragActive) return;
  const p = getPos(e);
  dragTotalDist = Math.max(dragTotalDist, Math.hypot(p.x-dragStartX, p.y-dragStartY));
  if (isDraggingCharacter) {
    pendingDragX = p.x - dragOffsetX;
    // 上方向へのドラッグ量に応じてジャンプを発生させる(最大2段、斜め方向でも反応)
    const upDist = dragStartY - p.y;
    const tier = Math.min(2, Math.floor(upDist / JUMP_DRAG_STEP));
    if (tier > dragJumpTier) {
      for (let i = dragJumpTier; i < tier; i++) doJump(p1);
      dragJumpTier = tier;
    }
  }
  e.preventDefault();
}
function onDragEnd(e) {
  if (!dragActive) return;
  const elapsed = performance.now() - dragStartTime;
  if (dragTotalDist < TAP_DIST && elapsed < TAP_TIME) {
    keys.attack = true;
    setTimeout(()=>{ keys.attack = false; }, 60);
  }
  isDraggingCharacter = false;
  pendingDragX = null;
  dragActive = false;
  e.preventDefault();
}

canvas.addEventListener('touchstart', onDragStart, {passive:false});
canvas.addEventListener('touchmove', onDragMove, {passive:false});
canvas.addEventListener('touchend', onDragEnd, {passive:false});
canvas.addEventListener('mousedown', onDragStart);
window.addEventListener('mousemove', (e)=>{ if(dragActive) onDragMove(e); });
window.addEventListener('mouseup', (e)=>{ if(dragActive) onDragEnd(e); });

let jumpPressedLast = false;
let attackPressedLast = false;

function respawn(f) {
  f.x = W/2 + (Math.random()*80-40);
  f.y = 60;
  f.vx = 0; f.vy = 0;
  f.dmg = 0;
  f.invuln = 90;
  f.hitstun = 0;
}

function knockback(target, attacker, type) {
  const dmgFactor = target.dmg * 0.16;
  const dir = target.x < attacker.x ? -1 : 1;

  // ヒットした瞬間、ダメージ量に関わらず必ず少し後ろに下がる
  const instantPush = type === 'lowkick' ? 16 : 12;
  target.x += dir * instantPush;
  target.x = Math.max(target.w/2, Math.min(W - target.w/2, target.x));

  if (type === 'lowkick') {
    // 下段キック: 大きく吹き飛ばさず、横に低く払う
    const power = 3 + dmgFactor;
    target.vx = dir * power * 0.9;
    target.vy = -power * 0.15 - 1;
    target.dmg += 6 + Math.random()*3;
  } else {
    // パンチ: 標準的な打ち上げ
    const power = 4 + dmgFactor;
    target.vx = dir * power * 0.6;
    target.vy = -power * 0.55 - 2;
    target.dmg += 8 + Math.random()*4;
  }
  target.hitstun = 14 + dmgFactor*0.5;
  for (let i=0;i<10;i++) {
    const ang = Math.random()*Math.PI*2;
    particles.push({ x:target.x, y:target.y, vx:Math.cos(ang)*4, vy:Math.sin(ang)*4, life:20, color:'255,220,120' });
  }
}

function physics(f, input, opponent) {
  if (f.dead) return;
  if (f.hitstun > 0) {
    f.hitstun--;
  } else if (input) {
    if (input.left) { f.vx -= 0.9; f.facing=-1; }
    if (input.right) { f.vx += 0.9; f.facing=1; }
    if (input.dragX != null) {
      const desired = Math.max(f.w/2, Math.min(W-f.w/2, input.dragX));
      const maxStep = 9; // すり抜け防止: 1フレームでの最大移動量
      const diff = desired - f.x;
      const step = Math.max(-maxStep, Math.min(maxStep, diff));
      if (step > 0.3) f.facing = 1;
      else if (step < -0.3) f.facing = -1;
      f.x += step;
      f.vx = 0;
    }
    if (input.jumpPress && f.jumps>0) {
      f.vy = -11;
      f.jumps--;
      for (let i=0;i<6;i++) particles.push({x:f.x,y:f.y+f.h/2,vx:(Math.random()-0.5)*2,vy:Math.random()*1,life:12,color:'200,220,255'});
    }
    if (input.attackPress && f.attackCooldown<=0) {
      f.attackType = input.attackType || 'punch';
      f.attackTimer = 10;
      f.attackCooldown = 24;
    }
  }
  if (f.attackTimer>0) f.attackTimer--;
  if (f.attackCooldown>0) f.attackCooldown--;
  if (f.invuln>0) f.invuln--;

  f.vx *= FRICTION;
  f.vy += GRAVITY;
  f.x += f.vx;
  f.y += f.vy;

  applyWallCollision(f, opponent);

  // 通常操作中(殴られていない時)は画面外まで出られないようにする。
  // 場外に出られるのは、殴られて吹っ飛んでいる(hitstun中の)時だけ。
  if (f.hitstun <= 0) {
    f.x = Math.max(f.w/2, Math.min(W - f.w/2, f.x));
  }

  f.onGround = false;

  for (const pl of platforms) {
    if (f.vy >= 0 &&
        f.x+f.w*0.3 < pl.x+pl.w && f.x+f.w*0.7 > pl.x &&
        f.y+f.h/2 >= pl.y && f.y+f.h/2 <= pl.y+pl.h+f.vy+2) {
      f.y = pl.y - f.h/2;
      f.vy = 0;
      f.onGround = true;
      f.jumps = 2;
    }
  }

  if (f.y + f.h/2 >= ground.y) {
    f.y = ground.y - f.h/2;
    if (f.vy > 0) f.vy = 0;
    f.onGround = true;
    f.jumps = 2;
  }

  if (f.y + f.h/2 > H) { f.y = H - f.h/2; f.vy = 0; }

  if (f.x < -80 || f.x > W+80) {
    f.stocks--;
    updateHUD();
    if (f.stocks <= 0) {
      f.dead = true;
      gameEnded = true;
      running = false;
      setTimeout(showResult, 500);
    } else {
      respawn(f);
    }
  }
}

function checkAttackHit(attacker, target) {
  if (attacker.attackTimer !== 9) return;
  if (target.invuln > 0) return;
  const type = attacker.attackType || 'punch';
  const reach = type === 'lowkick' ? 46 : 56; // 密着していても確実に届く距離
  const dx = target.x - attacker.x;

  // 近距離(密着時)なら向きに関わらずヒット、離れている場合は正しい向きが必要
  const facingOk = Math.abs(dx) < 20 || Math.sign(dx || attacker.facing) === attacker.facing;
  if (!facingOk) return;
  if (Math.abs(dx) > reach) return;

  if (type === 'lowkick') {
    // 足元同士の高さが近くないと当たらない(飛んでいる相手にはヒットしない)
    const targetFootY = target.y + target.h/2;
    const attackerFootY = attacker.y + attacker.h/2;
    if (Math.abs(targetFootY - attackerFootY) > 50) return;
  } else {
    // 上半身〜中段を狙う(高さの差が大きすぎるとヒットしない)
    const targetCenterY = target.y; // target.y は中心そのもの
    const attackerChestY = attacker.y - attacker.h*0.18;
    if (Math.abs(targetCenterY - attackerChestY) > attacker.h*0.6) return;
  }

  knockback(target, attacker, type);
}

function cpuInput(cpu, opponent) {
  const input = { left:false, right:false, jumpPress:false, attackPress:false, attackType:'punch' };
  const dx = opponent.x - cpu.x;
  const dist = Math.abs(dx);
  if (cpu.hitstun>0) return input;

  if (dist > 40) {
    if (dx>0) input.right = true; else input.left = true;
  }
  if (opponent.y < cpu.y - 30 && cpu.onGround && Math.random()<0.05) input.jumpPress = true;
  if (dist < 50 && cpu.attackCooldown<=0 && Math.random()<0.06) {
    input.attackPress = true;
    input.attackType = Math.random() < 0.5 ? 'punch' : 'lowkick';
  }
  return input;
}

function applyWallCollision(f, other) {
  if (!other || f.dead || other.dead) return;
  if (f.hitstun > 0 || other.hitstun > 0) return; // ノックバック中はすり抜けさせる
  const verticalGap = Math.abs(f.y - other.y);
  const passClearance = other.h * 0.55; // これ以上高く/低く離れていれば頭上を飛び越えられる
  if (verticalGap > passClearance) return;

  const minDist = f.w/2 + other.w/2;
  const dx = f.x - other.x;
  if (Math.abs(dx) < minDist) {
    f.x = other.x + Math.sign(dx || (f===p1 ? -1 : 1)) * minDist;
  }
}

let lastTime=0;
function loop(t) {
  update();
  draw();
  requestAnimationFrame(loop);
}

function update() {
  if (!running) {
    for (let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;if(p.life<=0)particles.splice(i,1);}
    return;
  }

  const p1input = {
    dragX: pendingDragX,
    jumpPress: keys.jump && !jumpPressedLast,
    attackPress: keys.attack && !attackPressedLast,
    attackType: queuedAttackType
  };
  jumpPressedLast = keys.jump;
  attackPressedLast = keys.attack;

  const p2input = cpuInput(p2, p1);

  physics(p1, p1input, p2);
  physics(p2, p2input, p1);

  checkAttackHit(p1, p2);
  checkAttackHit(p2, p1);

  for (let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life--;
    if(p.life<=0) particles.splice(i,1);
  }
}

function drawFighter(f) {
  if (f.dead) return;
  ctx.save();
  if (f.invuln>0 && Math.floor(f.invuln/4)%2===0) ctx.globalAlpha = 0.4;

  ctx.translate(f.x, f.y);
  const grad = ctx.createLinearGradient(0,-f.h/2,0,f.h/2);
  grad.addColorStop(0, f.color);
  grad.addColorStop(1, 'rgba(0,0,0,0.3)');
  ctx.fillStyle = grad;
  ctx.shadowColor = f.color;
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.roundRect(-f.w/2, -f.h/2, f.w, f.h, 8);
  ctx.fill();
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(f.facing*8, -f.h*0.38, 5, 0, Math.PI*2);
  ctx.fill();

  if (f.attackTimer>0) {
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.beginPath();
    if (f.attackType === 'lowkick') {
      ctx.ellipse(f.facing*30, f.h*0.42, 22, 10, 0, 0, Math.PI*2);
    } else {
      ctx.ellipse(f.facing*32, -f.h*0.18, 20, 10, 0, 0, Math.PI*2);
    }
    ctx.fill();
  }

  ctx.restore();
}

function draw() {
  ctx.clearRect(0,0,W,H);

  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#141a33');
  bg.addColorStop(1,'#05060d');
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);

  const gGrad = ctx.createLinearGradient(0,ground.y,0,H);
  gGrad.addColorStop(0,'#5b6b9e');
  gGrad.addColorStop(1,'#20264a');
  ctx.fillStyle = gGrad;
  ctx.fillRect(ground.x, ground.y, ground.w, H-ground.y);

  for (const pl of platforms) {
    const grad = ctx.createLinearGradient(pl.x,pl.y,pl.x,pl.y+pl.h);
    grad.addColorStop(0,'#5b6b9e');
    grad.addColorStop(1,'#2a3358');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(pl.x, pl.y, pl.w, pl.h, 6);
    ctx.fill();
  }

  drawFighter(p1);
  drawFighter(p2);

  for (const p of particles) {
    ctx.globalAlpha = Math.max(p.life/20,0);
    ctx.fillStyle = `rgb(${p.color})`;
    ctx.beginPath();
    ctx.arc(p.x,p.y,2.5,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function showResult() {
  const winner = p1.dead ? 'CPU' : 'P1';
  const winColor = p1.dead ? '#ff8a5c' : '#7fc4ff';
  overlay.style.display='flex';
  overlay.innerHTML = `
    <h1 style="background:none;-webkit-text-fill-color:${winColor};color:${winColor}">${winner} WINS!</h1>
    <p>もう一度挑戦してみよう！</p>
    <button class="startBtn" id="retryBtn">リトライ</button>
  `;
  document.getElementById('retryBtn').addEventListener('click', () => {
    overlay.style.display='none';
    initGame();
  });
}

startBtn.addEventListener('click', () => {
  overlay.style.display='none';
  initGame();
});

p1 = makeFighter(W*0.3,'#4fc3ff',1);
p2 = makeFighter(W*0.7,'#ff8a5c',-1);
particles = [];
running = false;
requestAnimationFrame(loop);
</script>
</body>
</html>
